name: 01 - cross build and release

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: Skip version check and force build of latest upstream OpenSSL tag
        type: boolean
        default: false
        required: false

permissions:
  actions: read
  id-token: write
  contents: write
  attestations: write

jobs:
  skip_duplicate_job:
    runs-on: ubuntu-24.04-arm
    permissions:
      actions: write
      contents: read
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        env:
          GH_TOKEN: ${{ github.token }}
          github_workflow: ${{ github.workflow }}
          github_ref_name: ${{ github.ref_name }}
          github_run_id: ${{ github.run_id }}
        run: |
          duplicates=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "${github_workflow}" --branch "${github_ref_name}" --limit 100 --json databaseId,status --jq ".[] | select(.status != \"completed\" and .databaseId < ${github_run_id}) | .databaseId" | tr '\n' ',' | sed 's/,$//')

          if [[ -n "$duplicates" ]]; then
            printf '%s\n' "should_skip=true" >> "$GITHUB_OUTPUT"
            printf '\n%b\n' "### :black_square_button: Skip Duplicate Job" >> $GITHUB_STEP_SUMMARY
            printf '\n%b\n' "Found older running/queued duplicate runs: ${duplicates}. Skipping this run." >> $GITHUB_STEP_SUMMARY
          else
            printf '%s\n' "should_skip=false" >> "$GITHUB_OUTPUT"
            printf '\n%b\n' "### :arrow_forward: Skip Duplicate Job" >> $GITHUB_STEP_SUMMARY
            printf '\n%b\n' "No older duplicate runs found. Proceeding." >> $GITHUB_STEP_SUMMARY
          fi

  check_release:
    if: needs.skip_duplicate_job.outputs.should_skip != 'true'
    needs: ["skip_duplicate_job"]
    runs-on: ubuntu-latest
    outputs:
      openssl_tag: ${{ steps.compare.outputs.openssl_tag }}
      needs_build: ${{ steps.compare.outputs.needs_build }}
    steps:
      - name: Check if new OpenSSL release is available
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          openssl_tag=$(gh api repos/openssl/openssl/releases --jq '[.[] | select(.prerelease == false) | select(.tag_name | test("rc|beta|alpha") | not)] | first | .tag_name')
          this_tag=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "none")

          printf '%s\n' "OpenSSL latest tag : ${openssl_tag}"
          printf '%s\n' "This repo latest tag: ${this_tag}"

          openssl_ver="${openssl_tag#openssl-}"
          this_ver="${this_tag#openssl-}"

          # Use sort -V for proper semver comparison
          newer=$(printf '%s\n%s' "${this_ver}" "${openssl_ver}" | sort -V | tail -n1)

          if [[ "${newer}" == "${openssl_ver}" && "${openssl_ver}" != "${this_ver}" ]]; then
            printf '%s\n' "New release detected - proceeding with build."
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            printf '\n%b\n' "### :rocket: New OpenSSL Release Detected" >> "$GITHUB_STEP_SUMMARY"
            printf '\n%b\n' "| | Tag |" >> "$GITHUB_STEP_SUMMARY"
            printf '%b\n' "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
            printf '%b\n' "| OpenSSL upstream | \`${openssl_tag}\` |" >> "$GITHUB_STEP_SUMMARY"
            printf '%b\n' "| This repo | \`${this_tag}\` |" >> "$GITHUB_STEP_SUMMARY"
            printf '\n%b\n' "Build triggered." >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' "No new release - skipping build."
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            printf '\n%b\n' "### :white_check_mark: No New OpenSSL Release" >> "$GITHUB_STEP_SUMMARY"
            printf '\n%b\n' "| | Tag |" >> "$GITHUB_STEP_SUMMARY"
            printf '%b\n' "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
            printf '%b\n' "| OpenSSL upstream | \`${openssl_tag}\` |" >> "$GITHUB_STEP_SUMMARY"
            printf '%b\n' "| This repo | \`${this_tag}\` |" >> "$GITHUB_STEP_SUMMARY"
            printf '\n%b\n' "Already up to date. Build skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "openssl_tag=${openssl_tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: check_release
    if: needs.check_release.outputs.needs_build == 'true' || inputs.force_build == true || inputs.force_build == true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [openssl]
        os_id: [alpine]
        os_version_id: [edge]
        arch_type:
          [
            aarch64-linux-musl,
            arm-linux-musleabi,
            arm-linux-musleabihf,
            armv6-linux-musleabihf,
            armv7l-linux-musleabihf,
            i686-linux-musl,
            x86_64-linux-musl,
            mips-linux-musl,
            mipsel-linux-musl,
            mips64-linux-musl,
            mips64el-linux-musl,
            powerpc-linux-musl,
            powerpc64le-linux-musl,
            s390x-linux-musl,
            riscv64-linux-musl,
            loongarch64-linux-musl,
          ]

    name: ${{ matrix.name }} ${{ matrix.arch_type }}

    env:
      prerelease: false
      XZ_OPT: "-9T0"
      container_name: cross_builder
      openssl_branch: ${{ needs.check_release.outputs.openssl_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set openssl architecture mapping
        run: |
          case "${{ matrix.arch_type }}" in
            aarch64-linux-musl) echo "openssl_arch=linux-aarch64" >> $GITHUB_ENV ;;
            arm-linux-musleabi) echo "openssl_arch=linux-armv4" >> $GITHUB_ENV ;;
            arm-linux-musleabihf|armv6-linux-musleabihf|armv7l-linux-musleabihf) echo "openssl_arch=linux-armv4" >> $GITHUB_ENV ;;
            i686-linux-musl) echo "openssl_arch=linux-x86" >> $GITHUB_ENV ;;
            x86_64-linux-musl) echo "openssl_arch=linux-x86_64" >> $GITHUB_ENV ;;
            mips-linux-musl) echo "openssl_arch=linux-mips32" >> $GITHUB_ENV ;;
            mipsel-linux-musl) echo "openssl_arch=linux-mips32" >> $GITHUB_ENV ;;
            mips64-linux-musl) echo "openssl_arch=linux64-mips64" >> $GITHUB_ENV ;;
            mips64el-linux-musl) echo "openssl_arch=linux64-mips64" >> $GITHUB_ENV ;;
            powerpc-linux-musl) echo "openssl_arch=linux-ppc" >> $GITHUB_ENV ;;
            powerpc64le-linux-musl) echo "openssl_arch=linux-ppc64le" >> $GITHUB_ENV ;;
            s390x-linux-musl) echo "openssl_arch=linux64-s390x" >> $GITHUB_ENV ;;
            riscv64-linux-musl) echo "openssl_arch=linux64-riscv64" >> $GITHUB_ENV ;;
            loongarch64-linux-musl) echo "openssl_arch=linux64-loongarch64" >> $GITHUB_ENV ;;
          esac

      - name: Create docker ${{ env.container_name }} ${{ matrix.arch }} container
        uses: userdocs/actions/qbt_docker@e8f57bd585c7bb6dcce011694d6772bab657abca # v1.0.7
        with:
          os_id: ghcr.io/userdocs/musl-cross-make
          os_version_id: ${{ matrix.arch_type }}
          additional_apps: >
            coreutils curl findutils git
          custom_docker_commands: |
            -e CFLAGS=-O3 -pipe -fdata-sections -ffunction-sections -fPIC -fstack-clash-protection -fstack-protector-strong -fno-plt -fno-delete-null-pointer-checks -fno-strict-overflow -fno-strict-aliasing -ftrivial-auto-var-init=zero -fexceptions -pthread -static --static
            -e CXXFLAGS=-O3 -pipe -fdata-sections -ffunction-sections -fPIC -fstack-clash-protection -fstack-protector-strong -fno-plt -fno-delete-null-pointer-checks -fno-strict-overflow -fno-strict-aliasing -ftrivial-auto-var-init=zero -fexceptions -pthread -static --static
            -e CPPFLAGS=-isystem /usr/include/fortify -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=3 -D_GLIBCXX_ASSERTIONS -w
            -e LDFLAGS=-pthread ${{ !startsWith(matrix.arch_type, 'mips') && '-fuse-ld=mold' || '' }}

      - name: Docker - Git clone openssl
        run: docker exec -w "${wd}" "${container_name}" git clone --single-branch --branch "${openssl_branch}" --shallow-submodules --recurse-submodules --depth 1 https://github.com/openssl/openssl.git openssl

      - name: Docker - Configure ${{ matrix.arch_type }} openssl
        run: |
          docker exec -w "${wd}/openssl" \
            -e CC=${{ matrix.arch_type }}-gcc \
            -e CXX=${{ matrix.arch_type }}-g++ \
            -e AR=${{ matrix.arch_type }}-ar \
            -e NM=${{ matrix.arch_type }}-nm \
            -e RANLIB=${{ matrix.arch_type }}-ranlib \
            "${container_name}" \
            ./Configure "${openssl_arch}" \
              --prefix="${wd}/openssl-completed" \
              --libdir="lib" \
              --openssldir="/etc/ssl" \
              --release \
              threads no-shared no-dso no-docs no-async no-comp no-idea no-mdc2 no-rc5 no-ec2m no-ssl3 no-seed no-weak-ssl-ciphers

      - name: Docker - Build ${{ matrix.arch_type }} openssl
        run: docker exec -w "${wd}/openssl" "${container_name}" make -j"$(nproc)"

      - name: Docker - Install ${{ matrix.arch_type }} openssl
        run: docker exec -w "${wd}/openssl" "${container_name}" make install_sw

      - name: Docker - Archive ${{ matrix.arch_type }} openssl build
        run: docker exec -w "${wd}/openssl-completed" "${container_name}" sh -c 'tar -cJf ../${{ matrix.arch_type }}.tar.xz *'

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.arch_type }}.tar.xz

      - name: Host - Create release - tag - assets
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          release_tag="${openssl_branch}"
          release_version="${openssl_branch#openssl-}"
          release_title="OpenSSL ${release_version}"
          release_notes="OpenSSL ${release_version} - fully static build for ${{ matrix.arch_type }} using musl cross-make"

          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" \
              --title "${release_title}" \
              --notes "${release_notes}" \
              --latest
            gh release upload "${release_tag}" \
              --clobber \
              "${{ matrix.arch_type }}.tar.xz"
          else
            gh release create "${release_tag}" \
              --title "${release_title}" \
              --notes "${release_notes}" \
              --latest \
              "${{ matrix.arch_type }}.tar.xz"
          fi
